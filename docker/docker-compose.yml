version: "3"

services:

  db:
    image: postgres:15
    container_name: odoo-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

  odoo:
    image: odoo:17
    container_name: odoo
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - ../odoo/custom-addons:/mnt/extra-addons
      - odoo-web-data:/var/lib/odoo
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo

volumes:
  odoo-db-data:
  odoo-web-data: